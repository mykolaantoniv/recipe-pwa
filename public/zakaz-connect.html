<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Підключення кошика</title>
<style>
  body { font-family: system-ui, sans-serif; background: #050816; color: #fff;
         display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .box { text-align: center; padding: 2rem; max-width: 360px; }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
  p { color: #8b8fa8; font-size: .9rem; margin: 0; }
</style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Зчитуємо токен…</h1>
  <p id="msg"></p>
</div>
<script>
  (function () {
    var icon  = document.getElementById('icon');
    var title = document.getElementById('title');
    var msg   = document.getElementById('msg');

    var hash   = location.hash.slice(1);
    var params = new URLSearchParams(hash);
    var token  = params.get('token');

    // Clear token from URL immediately to avoid it lingering in browser history
    if (history.replaceState) {
      history.replaceState(null, '', location.pathname);
    }

    if (!token || typeof token !== 'string' || token.length < 20 || token.length > 4096) {
      icon.textContent  = '❌';
      title.textContent = 'Токен не знайдено';
      msg.textContent   = 'Переконайтесь що ви увійшли в zakaz.ua і спробуйте ще раз.';
      return;
    }

    // Basic JWT structure check (three base64 parts separated by dots)
    var parts = token.split('.');
    if (parts.length !== 3) {
      icon.textContent  = '❌';
      title.textContent = 'Невалідний токен';
      msg.textContent   = 'Отриманий рядок не схожий на токен авторизації.';
      return;
    }

    // Always write localStorage so the installed PWA picks it up when it next opens.
    // BroadcastChannel is a bonus for browser tabs that are already open.
    try { localStorage.setItem('reciply_zakaz_token', token); } catch (e) { /* ignore */ }
    try {
      var bc = new BroadcastChannel('zakaz-token');
      bc.postMessage({ token: token });
      bc.close();
    } catch (e) { /* not supported */ }

    icon.textContent  = '✅';
    title.textContent = 'Кошик підключено!';
    msg.textContent   = 'Повертаємось в додаток…';

    setTimeout(function () { location.href = '/'; }, 1200);
  })();
</script>
</body>
</html>
